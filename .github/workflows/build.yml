name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  native:
    name: native (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: linux-x64,   runner: ubuntu-24.04,     ext: so,    out: libutp.so,    apt: '',                                  toolchain: '', osx_arch: '' }
          - { rid: linux-arm,   runner: ubuntu-24.04,     ext: so,    out: libutp.so,    apt: 'g++-arm-linux-gnueabihf',           toolchain: 'native/toolchain-linux-arm.cmake', osx_arch: '' }
          - { rid: linux-arm64, runner: ubuntu-24.04-arm, ext: so,    out: libutp.so,    apt: '',                                  toolchain: '', osx_arch: '' }
          # macos-13 (Intel) was deprecated by GitHub. We now cross-compile
          # the Intel x86_64 dylib from an Apple Silicon runner — the macOS
          # clang toolchain supports both targets via -arch.
          - { rid: osx-x64,     runner: macos-14,         ext: dylib, out: libutp.dylib, apt: '',                                  toolchain: '', osx_arch: 'x86_64' }
          - { rid: osx-arm64,   runner: macos-14,         ext: dylib, out: libutp.dylib, apt: '',                                  toolchain: '', osx_arch: 'arm64'  }
          - { rid: win-x64,     runner: windows-2022,     ext: dll,   out: utp.dll,      apt: '',                                  toolchain: '', osx_arch: '' }
          - { rid: win-arm64,   runner: windows-11-arm,   ext: dll,   out: utp.dll,      apt: '',                                  toolchain: '', osx_arch: '' }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure
        shell: bash
        run: |
          ARGS=(-S native -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TOOLS=OFF)
          if [ -n "${{ matrix.toolchain }}" ]; then
            ARGS+=(-DCMAKE_TOOLCHAIN_FILE="$PWD/${{ matrix.toolchain }}")
          fi
          if [ -n "${{ matrix.osx_arch }}" ]; then
            ARGS+=(-DCMAKE_OSX_ARCHITECTURES="${{ matrix.osx_arch }}")
          fi
          cmake "${ARGS[@]}"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Locate output
        shell: bash
        run: |
          mkdir -p out
          if [ -f build/${{ matrix.out }} ]; then
            cp build/${{ matrix.out }} out/
          elif [ -f build/Release/${{ matrix.out }} ]; then
            cp build/Release/${{ matrix.out }} out/
          else
            echo "Could not find ${{ matrix.out }} in build/" >&2
            ls -R build >&2
            exit 1
          fi
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: out/${{ matrix.out }}
          if-no-files-found: error

  pack:
    name: pack
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage runtimes/
        shell: bash
        run: |
          for rid in linux-x64 linux-arm linux-arm64 osx-x64 osx-arm64 win-x64 win-arm64; do
            dest=src/UtpStream/runtimes/$rid/native
            mkdir -p "$dest"
            cp artifacts/native-$rid/* "$dest/"
          done
          find src/UtpStream/runtimes -type f

      - name: Build
        run: dotnet build src/UtpStream/UtpStream.csproj -c Release

      - name: Test (linux-x64 only)
        run: dotnet test UtpStream.slnx -c Release --nologo

      - name: Pack
        run: dotnet pack src/UtpStream/UtpStream.csproj -c Release -o nupkg

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.*nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY not set; skipping publish."
            exit 0
          fi
          pkg=$(ls nupkg/*.nupkg | grep -v '\.symbols\.' | head -1)
          version=$(basename "$pkg" .nupkg | sed 's/^UtpStream\.//')
          echo "Package: UtpStream $version"
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/utpstream/${version}/utpstream.${version}.nupkg")
          if [ "$status" = "200" ]; then
            echo "UtpStream $version already exists on NuGet — skipping."
            exit 0
          fi
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY"
